spring:
  profiles:
    active: test
  datasource:
    url: jdbc:h2:mem:testdb
    username: sa
    password: 
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  docker:
    compose:
      enabled: false

app:
  jwt:
    secret: test-secret-key-for-unit-tests-only-minimum-256-bits-required
    expiration: 86400000
  admin:
    email: ${ADMIN_EMAIL:admin@hkbank.az}
    password: ${ADMIN_PASSWORD:Admin123!}
  ai:
    gemini:
      api-key: test-gemini-api-key
      api-url: https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash-exp:generateContent
      max-tokens: 1000
      temperature: 0.7
