spring:
  profiles:
    active: test
  datasource:
    url: jdbc:h2:mem:testdb
    username: sa
    password: 
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  docker:
    compose:
      enabled: false

app:
  jwt:
    secret: test-secret-key-for-unit-tests-only-minimum-256-bits-required
    expiration: 86400000
