version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: hkbank-postgres
    environment:
      POSTGRES_DB: hkbank_db
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - hkbank-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4
    container_name: hkbank-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@hkbank.az
      PGADMIN_DEFAULT_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - hkbank-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hkbank-backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - DB_URL=jdbc:postgresql://postgres:5432/hkbank_db
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - EXCHANGE_API_KEY=${EXCHANGE_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - hkbank-network

volumes:
  postgres_data:

networks:
  hkbank-network:
    driver: bridge