version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: hkbank-postgres
    environment:
      POSTGRES_DB: hkbank_db
      POSTGRES_USER: hkbank_user
      POSTGRES_PASSWORD: hkbank_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - hkbank-network

  pgadmin:
    image: dpage/pgadmin4
    container_name: hkbank-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@hkbank.az
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - hkbank-network

volumes:
  postgres_data:

networks:
  hkbank-network:
    driver: bridge